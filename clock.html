<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clock with CSS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"> 
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="clock.css">
</head>
<body>
 <main>
     <di class="container">
         <ul class="clock">
          <li class="number"><span>1</span></li>
          <li class="number"><span>2</span></li>
          <li class="number"><span class="red">3</span></li>
          <li class="number"><span>4</span></li>
          <li class="number"><span>5</span></li>
          <li class="number"><span class="red">6</span></li>
          <li class="number"><span>7</span></li>
          <li class="number"><span>8</span></li>
          <li class="number"><span class="red">9</span></li>
          <li class="number"><span>10</span></li>
          <li class="number"><span>11</span></li>
          <li class="number"><span class="red">12</span></li>
             <li class="hour-hand"></li>
             <li class="minute-hand"></li>
             <li class="second-hand"></li>
         </ul>
     </di>
 </main>    
</body>
</html>
